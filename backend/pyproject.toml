[tool.black]
line-length = 88
target-version = ["py312"]

[tool.ruff]
line-length = 88
target-version = "py312"

exclude = [
    ".venv",
    "__pycache__",
    ".pytest_cache",
    ".ruff_cache",
]

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
    "UP",
]

ignore = []

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = [
    "tests"
]

addopts = "-v"